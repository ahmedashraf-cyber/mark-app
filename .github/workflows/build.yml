name: Build MARK Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm install

      - name: Sync version to tauri.conf.json
        run: node scripts/sync-version.js
        shell: pwsh

      - name: Read version
        id: pkg
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Delete existing release for this version
        run: |
          $tag = "v${{ steps.pkg.outputs.VERSION }}"
          $repo = "${{ github.repository }}"
          $headers = @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"; Accept = "application/vnd.github+json" }
          try {
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/tags/$tag" -Headers $headers -ErrorAction Stop
            $id = $release.id
            Write-Host "Deleting release id=$id tag=$tag"
            Invoke-RestMethod -Method Delete -Uri "https://api.github.com/repos/$repo/releases/$id" -Headers $headers | Out-Null
            git push origin --delete $tag 2>$null
          } catch {
            Write-Host "No existing release for $tag"
          }
        shell: pwsh

      - name: Bundle ffmpeg (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $exe = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName "src-tauri/binaries/ffmpeg.exe" -Force
          Write-Host "ffmpeg bundled: $((Get-Item 'src-tauri/binaries/ffmpeg.exe').Length) bytes"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MARK_GOOGLE_CLIENT_SECRET: ${{ secrets.MARK_GOOGLE_CLIENT_SECRET }}
          MARK_GMAIL_SENDER_REFRESH: ${{ secrets.MARK_GMAIL_SENDER_REFRESH }}
          VITE_GH_SYNC_TOKEN: ${{ secrets.VITE_GH_SYNC_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'MARK v__VERSION__'
          releaseBody: |
            Download the .msi or .exe installer below.
            Requirements: Windows 10+
          # Publish only when building main; any other ref (e.g. a dispatched
          # feature branch) produces a DRAFT installer to test — drafts are
          # excluded from /releases/latest, so the in-app updater won't serve it.
          releaseDraft: ${{ github.ref != 'refs/heads/main' }}
          prerelease: false
          tauriScript: npx tauri
          args: --target x86_64-pc-windows-msvc
