name: Debug Tauri Build

on:
  workflow_dispatch:

jobs:
  debug-build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm install

      - name: Bundle ffmpeg (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $exe = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName "src-tauri/binaries/ffmpeg.exe" -Force

      - name: Run tauri build directly and capture full output
        shell: pwsh
        env:
          MARK_GOOGLE_CLIENT_SECRET: ${{ secrets.MARK_GOOGLE_CLIENT_SECRET }}
          VITE_GH_SYNC_TOKEN: ${{ secrets.VITE_GH_SYNC_TOKEN }}
        continue-on-error: true
        run: |
          npx tauri build --target x86_64-pc-windows-msvc 2>&1 | Tee-Object -FilePath debug_build_output.txt
          Write-Host "Exit code: $LASTEXITCODE"
          "Exit code: $LASTEXITCODE" | Add-Content -Path debug_build_output.txt

      - name: Commit debug output
        shell: bash
        run: |
          git config user.email "ahmed.ashraf@hudl.com"
          git config user.name "Ahmed Ashraf"
          git add debug_build_output.txt
          git diff --staged --quiet || git commit -m "ci: debug build output [skip ci]"
          git push origin main
